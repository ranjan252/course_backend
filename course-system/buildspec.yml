version: 0.2

env:
  variables:
    PYTHON_VERSION: "3.11"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "============================================="
      - echo "  Building Course System Artifacts"
      - echo "  (Lambda Package + Content Sync)"
      - echo "============================================="
      - echo ""

  pre_build:
    commands:
      - echo "[PRE-BUILD] Checking environment..."
      - python --version
      - pip --version
      - echo ""

      # Validate Lambda source files parse correctly
      - echo "[PRE-BUILD] Validating Python source..."
      - |
        python3 -c "
        import ast, sys, os
        errors = []
        for root, dirs, files in os.walk('.'):
            for f in files:
                if f.endswith('.py') and not any(skip in root for skip in ['scripts', 'tools', 'tests', 'content', '.git']):
                    path = os.path.join(root, f)
                    try:
                        with open(path) as fh: ast.parse(fh.read())
                    except SyntaxError as e:
                        errors.append(f'{path}: {e}')
        if errors:
            print('[ERROR] Syntax errors found:')
            for e in errors: print(f'  {e}')
            sys.exit(1)
        print('[OK] All Lambda source files parse OK')
        "
      - echo ""

  build:
    commands:
      # =========================================================
      # STEP 1: Create Lambda Package
      # =========================================================
      - echo "[STEP 1] Building Lambda package..."
      - mkdir -p package

      # Install dependencies
      - |
        if [ -f "requirements.txt" ]; then
          echo "Installing dependencies..."
          pip install -r requirements.txt -t package/ --quiet
          echo "[OK] Dependencies installed"
        fi

      # Copy Lambda source code (only what runs in Lambda)
      - |
        echo "Copying source code..."

        # Core handler + route modules
        if [ -d "handlers" ]; then
          cp -r handlers package/handlers
          echo "  [OK] Copied handlers/"
        fi

        # Core modules (curriculum, content_loader, progress_tracker, etc.)
        if [ -d "core" ]; then
          cp -r core package/core
          echo "  [OK] Copied core/"
        fi

        # Rescue module (handoff, prompt_builder, persona, templates)
        if [ -d "rescue" ]; then
          cp -r rescue package/rescue
          echo "  [OK] Copied rescue/"
        fi

      # Ensure __init__.py files exist for Python imports
      - |
        echo "Creating __init__.py files..."
        touch package/handlers/__init__.py 2>/dev/null || true
        touch package/core/__init__.py 2>/dev/null || true
        touch package/rescue/__init__.py 2>/dev/null || true

      # List package contents for verification
      - |
        echo ""
        echo "[INFO] Package structure:"
        find package -name "*.py" -type f | head -40
        echo ""
        echo "[INFO] Rescue assets:"
        find package/rescue -name "*.txt" -type f 2>/dev/null || echo "  (none)"
        echo ""

      # Create package zip
      - cd package && zip -r ../lambda_package.zip . -x "*.pyc" "__pycache__/*" && cd ..
      - echo "[OK] Lambda package created $(du -h lambda_package.zip | cut -f1)"
      - echo ""

      # =========================================================
      # STEP 2: Upload Lambda artifact to S3
      # =========================================================
      - echo "[STEP 2] Uploading Lambda artifact to S3..."
      - aws s3 cp lambda_package.zip s3://${S3_BUCKET}/${S3_PREFIX}/lambda_package.zip
      - echo "[OK] Uploaded to s3://${S3_BUCKET}/${S3_PREFIX}/lambda_package.zip"
      - echo ""

      # =========================================================
      # STEP 3: Sync course content to S3 content bucket
      # =========================================================
      - echo "[STEP 3] Syncing course content to S3..."
      - |
        if [ -d "content" ]; then
          aws s3 sync content/ s3://${CONTENT_BUCKET}/ \
            --include "*.json" \
            --delete \
            --size-only

          echo "[OK] Content synced to s3://${CONTENT_BUCKET}/"
          echo ""

          # Show what's in each course folder
          echo "[INFO] Content bucket contents:"
          for course_dir in content/*/; do
            course=$(basename "$course_dir")
            echo "  $course/:"
            echo "    curriculum.json: $([ -f "content/$course/curriculum.json" ] && echo 'YES' || echo 'MISSING')"
            echo "    warmup.json: $([ -f "content/$course/warmup.json" ] && echo 'YES' || echo 'MISSING')"
            echo "    foundation/: $(ls content/$course/foundation/*.json 2>/dev/null | wc -l) files"
            echo "    concepts/: $(ls content/$course/concepts/*.json 2>/dev/null | wc -l) files"
          done
        else
          echo "[WARN] No content/ directory found — skipping content sync"
        fi
      - echo ""

      # =========================================================
      # STEP 4: Verify uploaded artifacts
      # =========================================================
      - echo "[STEP 4] Verifying uploaded artifacts:"
      - aws s3 ls s3://${S3_BUCKET}/${S3_PREFIX}/
      - echo ""

  post_build:
    commands:
      - echo "============================================="
      - echo "  [OK] Build Complete!"
      - echo "============================================="
      - echo ""
      - echo "Lambda artifact:"
      - echo "  - s3://${S3_BUCKET}/${S3_PREFIX}/lambda_package.zip"
      - echo ""
      - echo "Content synced to:"
      - echo "  - s3://${CONTENT_BUCKET}/"
      - echo ""
      - echo "Lambda Handlers included:"
      - echo "  - course_handler      (API router — 7 routes)"
      - echo "  - warmup              (GET /course/warmup)"
      - echo "  - warmup_done         (POST /course/warmup-done)"
      - echo "  - next_content        (GET /course/next)"
      - echo "  - submit              (POST /course/submit)"
      - echo "  - progress            (GET /course/progress)"
      - echo "  - sathi               (POST /course/sathi)"
      - echo "  - rescue              (POST /course/rescue)"
      - echo "  - health_check        (EventBridge weekly)"
      - echo ""
      - echo "Core modules included:"
      - echo "  - settings"
      - echo "  - response"
      - echo "  - curriculum           (DAG engine)"
      - echo "  - content_loader       (S3 reads)"
      - echo "  - progress_tracker     (DynamoDB CRUD)"
      - echo "  - quiz_scorer"
      - echo "  - teacher_picker"
      - echo ""
      - echo "Ready for deployment stage"
      - echo ""

artifacts:
  files:
    - '**/*'
  name: course-system-build-$(date +%Y%m%d%H%M%S)